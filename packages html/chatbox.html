<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>DNA Lab | Collaborative Chat & Message Board - Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  
  <style>
    :root {
      --bg-dark: #0f121c;
      --surface: #181e2c;
      --surface2: #1f2537;
      --accent: #00e5a0;
      --accent2: #00b8d4;
      --text-light: #eef2ff;
      --text-dim: #8d9bb0;
      --danger: #ff5e7e;
      --warning: #ffb347;
      --purple: #c084fc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      overflow-x: hidden;
    }
    .chat-navbar {
      background: var(--surface) !important;
      border-bottom: 1px solid rgba(0,229,160,0.3);
    }
    .brand-dna {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--accent) !important;
    }
    .btn-primary-lab {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: #0a0e1a;
      font-weight: 700;
      padding: 8px 24px;
      border-radius: 40px;
    }
    .chat-main-card {
      background: var(--surface);
      border-radius: 28px;
      border: 1px solid rgba(0,229,160,0.15);
      overflow: hidden;
    }
    .chat-messages-area {
      background: var(--surface2);
      height: 520px;
      overflow-y: auto;
      padding: 1.2rem;
    }
    .chat-message {
      background: var(--surface);
      border-radius: 18px;
      padding: 0.9rem 1.2rem;
      margin-bottom: 1rem;
      border-left: 4px solid var(--accent);
    }
    .msg-author {
      font-weight: 800;
      color: var(--accent);
      background: rgba(0,229,160,0.12);
      padding: 2px 10px;
      border-radius: 30px;
    }
    .form-control-custom {
      background: #0b0f18;
      border: 1px solid #2a3448;
      color: white;
      border-radius: 40px;
    }
    .online-status {
      width: 100px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--accent);
      display: inline-block;
    }
    .toast-custom {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--accent);
      padding: 10px 24px;
      border-radius: 50px;
      transition: transform 0.25s ease;
      z-index: 1100;
    }
    .toast-custom.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="d-flex flex-column min-vh-100">
  <nav class="navbar chat-navbar px-3 py-2">
    <div class="container-fluid">
      <a class="navbar-brand brand-dna" href="#">🧬 DNA Lab | Online Chat</a>
      <div class="d-flex gap-2 align-items-center">
        <span class="badge bg-dark" id="totalMsgBadge">💬 0 messages</span>
        <span class="badge bg-dark" id="connectionStatus">🟡 Connecting...</span>
      </div>
    </div>
  </nav>

  <div class="container my-4 flex-grow-1">
    <div class="chat-main-card">
      <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
        <h4 class="m-0" style="color: var(--accent);">💬 Live Collaboration</h4>
        <button class="btn btn-outline-danger btn-sm" id="clearAllChatBtn">Clear All</button>
      </div>

      <div id="messagesContainer" class="chat-messages-area">
        <div class="text-center text-secondary py-5">Loading messages...</div>
      </div>

      <div class="chat-input-panel p-3">
        <div class="row g-2">
          <div class="col-md-3">
            <input type="text" id="authorNameInput" class="form-control form-control-custom" placeholder="Name" value="Participant">
          </div>
          <div class="col-md-7">
            <input type="text" id="messageInput" class="form-control form-control-custom" placeholder="Type a message...">
          </div>
          <div class="col-md-2">
            <button id="sendMsgBtn" class="btn-primary-lab w-100">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="dynamicToast" class="toast-custom"></div>

<script>
  // YOUR CONFIGURATION
  const firebaseConfig = {
    apiKey: "AIzaSyC_75CGGv9CfrpTGV3Bs04JBUykhSBcWr8",
    authDomain: "dna-lab-ab585.firebaseapp.com",
    databaseURL: "https://dna-lab-ab585-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "dna-lab-ab585",
    storageBucket: "dna-lab-ab585.firebasestorage.app",
    messagingSenderId: "1013587010369",
    appId: "1:1013587010369:web:355dfd33e2a478601337c0"
  };

  // 1. INITIALIZE
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const messagesRef = database.ref('chat-messages');
  const currentUserId = 'user_' + Math.random().toString(36).substr(2, 9);

  // 2. CONNECTION STATUS
  database.ref('.info/connected').on('value', (snap) => {
    const status = document.getElementById('connectionStatus');
    if (snap.val() === true) {
      status.innerHTML = "🟢 Connected";
      status.style.color = "var(--accent)";
    } else {
      status.innerHTML = "🔴 Offline";
      status.style.color = "var(--danger)";
    }
  });

  // 3. RENDER LOGIC
  function renderMessages(data) {
    const container = document.getElementById('messagesContainer');
    if (!data) {
      container.innerHTML = '<div class="text-center text-secondary py-5">No messages yet.</div>';
      return;
    }
    
    const messages = Object.entries(data).map(([id, val]) => ({ id, ...val }));
    document.getElementById('totalMsgBadge').innerText = `💬 ${messages.length} messages`;

    container.innerHTML = messages.map(msg => `
      <div class="chat-message">
        <div class="d-flex justify-content-between small mb-1">
          <span class="msg-author">${msg.author}</span>
          <span class="text-muted">${new Date(msg.timestamp).toLocaleTimeString()}</span>
        </div>
        <div>${msg.text}</div>
      </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
  }

  // 4. SEND LOGIC
  document.getElementById('sendMsgBtn').onclick = () => {
    const author = document.getElementById('authorNameInput').value;
    const text = document.getElementById('messageInput').value;
    if (text.trim()) {
      messagesRef.push({
        author: author || "Anonymous",
        text: text,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        userId: currentUserId
      });
      document.getElementById('messageInput').value = "";
    }
  };

  // Listen for real-time updates
  messagesRef.on('value', (snapshot) => renderMessages(snapshot.val()));

  // Admin Clear All (Password: dnalab2024)
  document.getElementById('clearAllChatBtn').onclick = () => {
    if (prompt("Admin Password?") === "dnalab2024") {
      messagesRef.remove();
    }
  };
</script>
</body>
</html>
