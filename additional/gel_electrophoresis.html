<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Access | Gel Electrophoresis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lock-card {
            max-width: 400px;
            width: 100%;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 15px;
        }
        .btn-primary {
            background-color: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 8px;
        }
        .input-group-text {
            cursor: pointer;
            background-color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card lock-card mx-auto p-4 text-center">
        <div class="mb-4">
            <div class="display-1 text-primary">🧬</div>
            <h2 class="fw-bold mt-2">Laboratory Access</h2>
            <p class="text-muted small">Unlock Gel Electrophoresis Simulation</p>
        </div>

        <div id="loginForm">
            <div class="mb-3">
                <div class="input-group">
                    <input type="password" id="passwordInput" class="form-control form-control-lg border-end-0" placeholder="Enter password" aria-label="Password">
                    <span class="input-group-text border-start-0" onclick="togglePassword()">
                        <i class="bi bi-eye-slash" id="toggleIcon"></i>
                    </span>
                </div>
                <div id="errorMsg" class="text-danger small mt-2 d-none">Incorrect password. Please try again.</div>
            </div>
            <button onclick="checkPassword()" class="btn btn-primary w-100 fw-bold">Unlock Simulation</button>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('passwordInput');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.replace('bi-eye-slash', 'bi-eye');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.replace('bi-eye', 'bi-eye-slash');
        }
    }

    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        const error = document.getElementById('errorMsg');
        const targetUrl = "https://l.facebook.com/l.php?u=https%3A%2F%2Fonline-simulation--sancanz47.replit.app%2F%3Ffbclid%3DIwZXh0bgNhZW0CMTAAYnJpZBExejhSVHE4YlZVUjY2d2VYa3NydGMGYXBwX2lkEDIyMjAzOTE3ODgyMDA4OTIAAR4OhzWsbUK-TWyTosMLQVRyJ7H264hYwQtBNuwhcKjWjWVzEQ1rTXFUqPhsGA_aem_Eq80kq3MnmUcXPZnI58Q3Q&h=AT4DB2EM7EvqfhBfWzrTATKgXw2O2AHmXwk2M7EGfWm6pjOqEPgSvtVhKRcHZuKGAwcyxTwzdXLjM-fgPf6jlV5fMnoqCr4RgACkH99EOVvAkhqRinjqnCn-AnXZqbU78ISM6Q";

        if (input === "gel electrophoresis") {
            error.classList.add('d-none');
            window.open(targetUrl, '_blank');
            document.getElementById('passwordInput').value = "";
        } else {
            error.classList.remove('d-none');
        }
    }

    document.getElementById('passwordInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });
</script>

</body>
</html>
